version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: snake-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: snake-game
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: snake-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/snake-game
      JWT_SECRET: snake-pro-jwt-secret-change-in-production
    depends_on:
      - mongodb

  frontend:
    image: nginx:alpine
    container_name: snake-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mongo_data:
